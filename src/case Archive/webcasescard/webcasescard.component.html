<div class="table-card">
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <span>Loading cases…</span>
  </div>
  <div class="empty-state" *ngIf="!isLoading && cases.length === 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>No cases found</p>
  </div>
  <div class="table-scroll" *ngIf="!isLoading && cases.length > 0">
    <table>
      <thead>
        <tr>
          <th>Case ID</th><th>Date</th><th>Patient</th>
          <th>Severity</th><th>AI prediction</th>
          <th>Status</th><th>Paramedic</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <app-tablerow-stack
          *ngFor="let row of cases; trackBy: trackById"
          [caseRow]="row"
          (viewCase)="onViewCase($event)"
        ></app-tablerow-stack>
      </tbody>
    </table>
  </div>
</div>
