<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-overlay"></div>
  </div>

  <div class="auth-card-wrapper">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-icon">
          <img src="../../assets/img/Main AI CTA.png" alt="Riven Logo" class="logo " width="35" height="35" />

        </div>
        <span class="brand-name">Riven</span>
      </div>

      <h1 class="form-title">Log In</h1>

      <!-- Error Banner -->
      <div class="error-banner" *ngIf="errorMsg">{{ errorMsg }}</div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="field">
          <label class="field-label">Email <span class="required">*</span></label>
          <div class="input-wrap" [class.error]="email.invalid && email.touched">
          
            <input type="email" formControlName="email" placeholder="emergency.admin@cityambulance.org" class="input"
              autocomplete="email" />
          </div>
          <span class="error-msg" *ngIf="email.invalid && email.touched">
            {{ email.errors?.['required'] ? '⚠ Email is required' : '⚠ Enter a valid email address' }}
          </span>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="field-label">Password <span class="required">*</span></label>
          <div class="input-wrap" [class.error]="password.invalid && password.touched">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 4l6 5 6-5" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" />
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="#9CA3AF" stroke-width="1.4" />
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••• ••• ••• •••"
              class="input" autocomplete="current-password" />
            <button type="button" class="toggle-eye" (click)="togglePassword()">

              <!-- Eye Open -->
              <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="#9CA3AF" stroke-width="1.4" />
                <circle cx="8" cy="8" r="2" stroke="#9CA3AF" stroke-width="1.4" />
              </svg>

              <!-- Eye Closed -->
              <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M1 1l14 14" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" />
                <path
                  d="M6.5 6.6A2 2 0 0010.4 9.5M3.3 3.8A7 7 0 001 8s2.5 5 7 5a6.9 6.9 0 004.2-1.4M6 3.2A7 7 0 0115 8s-.7 1.4-1.9 2.6"
                  stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" />
              </svg>

            </button>
          </div>
          <span class="error-msg" *ngIf="password.invalid && password.touched">
            {{ password.errors?.['required'] ? '⚠ Password is required' : '⚠ Password must be at least 6 characters' }}
          </span>
        </div>

        <!-- Forgot Password -->
        <div class="forgot-row">
          <a routerLink="/auth/otp" class="forgot-link">Forget Password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">Log In</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>

        <div class="divider"><span>Or</span></div>

        <!-- Social -->
        <div class="social-row">
          <button type="button" class="btn-social" (click)="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path
                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
                fill="#4285F4" />
              <path
                d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
                fill="#34A853" />
              <path
                d="M3.964 10.705A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.705V4.963H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.037l3.007-2.332z"
                fill="#FBBC05" />
              <path
                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.963L3.964 7.295C4.672 5.168 6.656 3.58 9 3.58z"
                fill="#EA4335" />
            </svg>
            Google
          </button>
          <button type="button" class="btn-social" (click)="loginWithMicrosoft()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="0" y="0" width="8.5" height="8.5" fill="#F25022" />
              <rect x="9.5" y="0" width="8.5" height="8.5" fill="#7FBA00" />
              <rect x="0" y="9.5" width="8.5" height="8.5" fill="#00A4EF" />
              <rect x="9.5" y="9.5" width="8.5" height="8.5" fill="#FFB900" />
            </svg>
            Microsoft
          </button>
          <button type="button" class="btn-social" (click)="loginWithApple()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path
                d="M12.5 0c.1 1.4-.4 2.8-1.2 3.8-.8 1-2 1.7-3.2 1.6-.1-1.3.5-2.7 1.3-3.6C10.2.8 11.5.1 12.5 0zM17 12.8c-.5 1.1-1.1 2.1-1.9 3-.7.8-1.4 1.2-2.3 1.2-.8 0-1.5-.4-2.4-.4s-1.6.4-2.4.4c-.9 0-1.7-.5-2.3-1.3C4 13.8 3 11.5 3 9.2c0-3.8 2.5-5.8 4.9-5.8.9 0 1.8.4 2.5.4.6 0 1.6-.5 2.7-.5 1.7 0 3.3.9 4.1 2.5-3.6 2-3 7 .8 7z"
                fill="currentColor" />
            </svg>
            Apple
          </button>
        </div>

        <p class="signup-link">
          Don't have an account? <a routerLink="/auth/signup">Sign Up</a>
        </p>

      </form>
    </div>
  </div>
</div>
