<div class="root">
  <main class="web-cases-card">
    <div class="details-parent">
      <div class="details">
        <div class="arrival-time">
        
           <i class="fa-solid fa-location-dot pin-icon"></i>
        </div>
        <h1 class="live-tracking">Live Tracking</h1>
      </div>
      <div class="exit-button" (click)="onClose()">
        <i class="fa-solid fa-xmark exit-icon"></i>
      </div>
    </div>
    <app-hospital-details></app-hospital-details>
    <app-map-call
      [property1]="'Default'"
      [text]="'Call Ambulance'"
      [callWidth]="'unset'"
      [callAlignSelf]="'stretch'"
    ></app-map-call>
  </main>
</div>
