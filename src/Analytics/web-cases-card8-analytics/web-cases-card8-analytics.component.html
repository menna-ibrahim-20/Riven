<section class="chart-card">
  <div class="chart-header">
    <div class="chart-icon" style="background:#fff7e6;">
      <i class="fa-solid fa-clock" style="color:#f59e0b;font-size:18px;"></i>
    </div>
    <div class="chart-header-text">
      <h2 class="chart-title">Avg Assessment Time</h2>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#1976d2;"></span>Actual Time</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e53935;border: 2px dashed #e53935; background:transparent;"></span>Target</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="chart-wrap">
    <canvas #chartCanvas role="img" aria-label="Assessment time line chart"></canvas>
  </div>
</section>
