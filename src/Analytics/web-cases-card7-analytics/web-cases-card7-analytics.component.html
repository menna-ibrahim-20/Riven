<section class="chart-card">
  <div class="chart-header">
    <div class="chart-icon" style="background:#e8f0fe;">
      <i class="fa-solid fa-chart-column" style="color:#1976d2;font-size:18px;"></i>
    </div>
    <div class="chart-header-text">
      <h2 class="chart-title">Daily Case Volume</h2>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#1976d2;"></span>Actual</span>
        <span class="legend-item"><span class="legend-dot" style="background:#d6dadd;"></span>Average</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="chart-wrap">
    <canvas #chartCanvas role="img" aria-label="Daily case volume bar chart"></canvas>
  </div>
</section>
